services:
  app:
    image: ${SYSTEMKONTROLL_IMAGE:-ghcr.io/kjellmagne/systemkontroll:latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      ORG_STRUCTURE_PATH: /data/organization-structure.json
      DATABASE_SSL: "false"
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_HOURS: ${AUTH_SESSION_HOURS:-12}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      AUTH_ALLOWED_EMAIL_DOMAINS: ${AUTH_ALLOWED_EMAIL_DOMAINS:-}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS:-}
      AUTH_MICROSOFT_TENANT_ID: ${AUTH_MICROSOFT_TENANT_ID:-}
      AUTH_MICROSOFT_CLIENT_ID: ${AUTH_MICROSOFT_CLIENT_ID:-}
      AUTH_MICROSOFT_CLIENT_SECRET: ${AUTH_MICROSOFT_CLIENT_SECRET:-}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: systemkontroll
      DB_USER: systemkontroll
      DB_PASSWORD: ${SYSTEMKONTROLL_DB_PASSWORD:?Set SYSTEMKONTROLL_DB_PASSWORD in .env}
    ports:
      - "${SYSTEMKONTROLL_HOST_PORT:-3100}:3000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: systemkontroll
      POSTGRES_USER: systemkontroll
      POSTGRES_PASSWORD: ${SYSTEMKONTROLL_DB_PASSWORD:?Set SYSTEMKONTROLL_DB_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systemkontroll -d systemkontroll"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
    name: systemkontroll-postgres-data
