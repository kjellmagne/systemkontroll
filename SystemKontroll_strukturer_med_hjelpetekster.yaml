      - key: architecture_reviews
        label: "Arkitekturvurderinger"
        sections:
          - key: review_criteria
            label: "Vurderinger"
            help_text: null
            help_text_status: criteria_specific_help_text_available
            repeating_item:
              fields:
                - key: score
                  label: "Score"
                  type: integer
                  control: radio_1_to_5
                - key: comment
                  label: "Kommentar"
                  type: textarea
                  control: textarea
            criteria:
              - key: service_orientation
                label: "Tjenesteorientering"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  Funksjonalitet og ytelsesnivå skal være hovedhensyn ved utvikling av IT-løsninger. IT-tjenester som er nødvendig for å understøtte hele eller deler av en eller flere arbeidsprosesser skal identifiseres.

                  Forklaring:
                  Prinsippet skal understøtte strategisk, effektiv og kostnadseffektiv bruk av IT ved å ta hensyn til hvilke tjenester som leveres av en komponent, fremfor hvordan komponenten er sammensatt. Dette bidrar til å bryte opp siloer og legge til rette for gjenbruk.

                  Konsekvenser:
                  Virksomheten bør sikre helhet og sammenheng med oppgaveløsningen, og IT-løsninger bør være modulariserte, løst koblet og bruke veldefinerte grensesnitt. Ved videreutvikling eller nyetablering bør virksomheten vurdere om det finnes løsninger eller komponenter som kan gjenbrukes, og om løsningen kan være relevant for andre deler av offentlig sektor.
              - key: interoperability
                label: "Interoperabilitet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  Virksomheten og dens IT-løsninger må ved behov kunne samhandle med andre relevante virksomheter og deres IT-løsninger på et hensiktsmessig nivå.

                  Forklaring:
                  Prinsippet skal legge til rette for effektiv informasjonsflyt og sikre at IT-utviklingen støtter arbeidsprosesser og regelverk, både internt og på tvers av virksomheter.

                  Prinsippet skiller mellom organisatorisk, semantisk og teknisk interoperabilitet.

                  Konsekvenser:
                  Behovet for samhandling og konsekvensene for organisatorisk, semantisk og teknisk interoperabilitet skal alltid vurderes. Referansekatalog for IT-standarder i offentlig sektor skal legges til grunn, og åpne standarder skal benyttes der katalogen ikke gir anvisning.
              - key: accessibility
                label: "Tilgjengelighet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  Elektroniske tjenester skal være tilgjengelig når brukerne trenger dem, lette å finne frem til og brukervennlige og universelt utformet.

                  Forklaring:
                  Tjenestene skal kunne benyttes av alle relevante brukergrupper uavhengig av alder, kjønn, funksjonsevne og kulturell eller etnisk bakgrunn. Prinsippet er særlig relevant for tjenester rettet mot allmennheten.

                  Konsekvenser:
                  Elektroniske tjenester rettet mot allmennheten må være i tråd med diskriminerings- og tilgjengelighetsloven og annet relevant regelverk. Det bør vurderes standardvalg, kanalvalg, publisering, språktilpasning, åpningstid, teknologi- og plattformuavhengighet, og involvering av relevante brukergrupper i utvikling og testing.
              - key: security
                label: "Sikkerhet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  IT-løsningen i seg selv og informasjonen som behandles i denne, skal med utgangspunkt i formelle og risikobaserte krav beskyttes mot brudd på konfidensialitet, integritet og tilgjengelighet.

                  Forklaring:
                  Offentlige IT-løsninger skal etableres og driftes på en sikkerhetsmessig god måte. Hver løsning skal klassifiseres basert på risikoanalyse, og krav til konfidensialitet, integritet og tilgjengelighet skal oppfylles.

                  Konsekvenser:
                  Virksomheten må kartlegge relevant regelverk, dokumentere at løsningen oppfyller kravene, gjennomføre risikoanalyse, tilordne passende sikkerhetsnivå, implementere tiltak og teste at tiltakene fungerer som forventet.
              - key: openness
                label: "Åpenhet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  IT-løsningers virkemåte og datagrunnlag skal kunne gjøres rede for.

                  Forklaring:
                  Prinsippet skal understøtte rettssikkerheten ved at premissene for avgjørelser er kjent, særlig i beslutnings- og beslutningsstøttesystemer.

                  Konsekvenser:
                  Løsninger skal utvikles slik at avgjørelser er dokumenterbare og sporbare, og forvalteren må kunne redegjøre for datagrunnlag og regelanvendelse ved behov.
              - key: flexibility
                label: "Fleksibilitet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  IT-løsninger skal være utformet slik at de ikke fremstår som begrensende for endringer i arbeidsprosesser, innhold, organisering, eierskap og infrastruktur.

                  Forklaring:
                  Prinsippet skal bidra til kostnadseffektivitet ved at løsninger kan tilpasses endrede rammevilkår og fortsatt støtte virksomhetens behov og oppgaveløsning.

                  Konsekvenser:
                  Tjenester må være definert på hensiktsmessig nivå, løsninger og komponenter må være modulariserte, og organisatoriske forhold og forvaltningsprosesser må kunne håndtere endringsbehov.
              - key: scalability
                label: "Skalerbarhet"
                help_text_mode: normalized_transcription
                help_text: |-
                  Nasjonalt arkitekturprinsipp:
                  IT-løsninger skal kunne skaleres ved endringer i bruken.

                  Forklaring:
                  Prinsippet skal bidra til bevisstgjøring om at løsninger fortsatt skal kunne benyttes når antall brukere, volumer, responstider eller livsløp endrer seg.

                  Konsekvenser:
                  Løsninger og komponenter må være modulariserte slik at de kan opp- og nedskaleres etter at de er satt i drift, og organisatoriske forhold som avtaler og brukerstøtte må kunne skaleres tilsvarende.
          - key: historical_reviews
            label: "Tidligere vurderinger"
            help_text: null
