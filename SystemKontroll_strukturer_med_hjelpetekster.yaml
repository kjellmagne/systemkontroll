  dataset:
    entity: Dataset
    source:
      route_pattern: "/digiorden/datasets/{id}"
      example_title: "Barnevern Datasett"
      example_subtitle: "Datasett"
      source_status: complete_for_visible_sections
    tabs:
      - key: description
        label: "Beskrivelse"
        sections:
          - key: general_information
            label: "Grunninformasjon"
            fields:
              - key: name
                label: "Navn"
                type: text
                required: true
                control: input_text
                placeholder: "Navn"
                help_text_mode: raw
                help_text: "Hva datasettet skal hete."
              - key: description
                label: "Beskrivelse"
                type: text
                required: false
                control: input_text
                placeholder: "Beskrivelse"
                help_text_mode: raw
                help_text: "Hva datasettet inneholder. Dette kan være både generell og spesiell informasjon i fritekst."
              - key: purpose
                label: "Formål"
                type: textarea
                required: false
                control: textarea
                placeholder: "Formål"
                help_text_mode: raw
                help_text: "Formålet med datasettet i fritekst."
          - key: data_characteristics
            label: "Datakarakteristikk"
            fields:
              - key: has_master_data
                label: "Inneholder masterdata"
                type: boolean
                required: false
                control: radio
                options:
                  - value: true
                    label: "Ja"
                  - value: false
                    label: "Nei"
                help_text_mode: raw
                help_text: "Masterdata er i løsningen definert som hoveddata som originalt er opprettet i èn applikasjon."
              - key: has_personal_data
                label: "Inneholder personopplysninger"
                type: boolean
                required: false
                control: radio
                options:
                  - value: true
                    label: "Ja"
                  - value: false
                    label: "Nei"
                help_text_mode: normalized_transcription
                help_text: |-
                  Personopplysninger er alle opplysninger og vurderinger som kan knyttes til deg som enkeltperson.

                  Typiske personopplysninger er navn, adresse, telefonnummer, e-post og fødselsnummer. Et bilde regnes som en personopplysning dersom personer kan gjenkjennes, og lydopptak kan være personopplysninger selv om ingen navn blir nevnt. Biometri som fingeravtrykk, irismønster og hodeform for ansiktsgjenkjenning er også personopplysninger.

                  En dynamisk IP-adresse er også definert som personopplysning. Registreringsnummer på bil kan være personopplysning hvis det kan knyttes til en bestemt person. Opplysninger om atferdsmønstre, som hva du handler, hvilke butikker du går i, hvilke tv-serier du ser på, hvor du beveger deg og hva du søker etter på nettet, er også personopplysninger.
              - key: has_sensitive_personal_data
                label: "Inneholder sensitive personopplysninger"
                type: boolean
                required: false
                control: radio
                options:
                  - value: true
                    label: "Ja"
                  - value: false
                    label: "Nei"
                help_text_mode: normalized_transcription
                help_text: |-
                  Sensitive personopplysninger, kalt særlige kategorier i loven, er opplysninger som krever særskilt behandlingsgrunnlag.

                  Kategoriene som listes i skjemaet er:
                  - opplysninger om rasemessig eller etnisk opprinnelse
                  - opplysninger om politisk oppfatning
                  - opplysninger om religion
                  - opplysninger om filosofisk overbevisning
                  - opplysninger om fagforeningsmedlemskap
                  - genetiske opplysninger
                  - biometriske opplysninger med formål å entydig identifisere noen
                  - helseopplysninger
                  - opplysninger om seksuelle forhold
                  - opplysninger om seksuell legning
                  - opplysninger om straffedommer
                  - opplysninger om lovovertredelser
          - key: hosting
            label: "Driftsplassering"
            fields:
              - key: hosting_type
                label: "Driftsplassering"
                type: enum
                required: false
                control: select
                placeholder: "Driftsplassering"
                help_text_mode: raw
                help_text: "Hvor er datasettet lokalisert? Eksempler: i skyen eller på lokal tjener."
                options:
                  - value: Cloud
                    label: "Sky"
                  - value: LocalServer
                    label: "Lokal server"
                  - value: ExternalServer
                    label: "Ekstern server"
                  - value: PrivateCloud
                    label: "Privat sky"
                  - value: CloudAndLocal
                    label: "Sky/lokalt"
          - key: information_elements
            label: "Informasjonselementer"
            help_text: null
            help_text_status: not_visible_in_supplied_html
            collections:
              - key: information_elements
                label: "Informasjonselementer"
                item_type: information_element
                add_button_label: "Legg til infomasjonselement"
                columns:
                  - "Navn"
                  - "Beskrivelse"
                  - "Person-opplysninger"
                  - "Sensitive personopplysninger"
          - key: links
            label: "Relevante lenker"
            help_text: null
            help_text_status: not_visible_in_supplied_html
            collections:
              - key: links
                label: "Relevante lenker"
                item_type: link
                add_button_label: "Legg til lenke"
                columns:
