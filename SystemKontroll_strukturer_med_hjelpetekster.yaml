              - key: internal_responsible
                label: "Internt ansvarlig"
                type: reference
                required: false
                control: select
                placeholder: "velg fra listen"
                option_source: organization_users
                help_text_mode: raw
                help_text: "Intern ansvarlig i kommunen for behandlingen."
              - key: additional_notes
                label: "Annet om behandlingen"
                type: textarea
