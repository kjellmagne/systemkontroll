schema_version: 1
exported_at: 2026-03-25
export_name: SystemKontroll_strukturer_med_hjelpetekster
notes:
  - "Denne YAML-filen samler de sju strukturene: Applikasjoner, Datasett, NIS2, Grunnprinsipper for IKT-sikkerhet, Behandlingsansvarlig protokoll, Databehandler protokoll og Roller."
  - "help_text bevarer synlig hjelpe-/informasjonstekst fra HTML-snippene der den var tilgjengelig."
  - "Der hjelpetekst ikke var synlig i levert HTML, er help_text satt til null og help_text_status forklarer hvorfor."
  - "Noen svært lange hjelpetekster er normalisert til lesbar YAML, men innholdet er bevart."

