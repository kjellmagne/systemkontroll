                  - "Url"
                  - "Beskrivelse"

      - key: relations
        label: "Relasjoner"
        sections:
          - key: applications
            label: "Applikasjoner"
            help_text: null
            help_text_status: not_visible_in_supplied_html
            collections:
              - key: application_relations
                label: "Applikasjoner"
                item_type: relation
                add_button_label: "Legg til applikasjon"
                columns:
                  - "Navn"
                  - "Versjon"
                  - "Rolle"
          - key: related_datasets
            label: "Relaterte datasett"
            help_text: null
            help_text_status: not_visible_in_supplied_html
            collections:
              - key: related_datasets
                label: "Relaterte datasett"
