  controller_protocol:
    entity: ProcessingActivity
    profile: controller
    source:
      route_context: "Behandlingsansvarlig protokoll"
      example_title: "Ny behandling (02-06-2023)"
      source_status: complete_for_visible_sections
    tabs:
      - key: registration
        label: "Registrering"
        sections:
          - key: general_information
            label: "Grunninformasjon"
            fields:
              - key: name
                label: "Navn"
                type: text
                required: true
                control: input_text
                placeholder: "Navn på behandlingen"
                help_text: null
                help_text_status: no_visible_help_text_in_supplied_html
              - key: processing_description
                label: "Hva gjelder behandlingen?"
                type: textarea
                required: false
                control: textarea
                placeholder: "Ny tekst"
                help_text_mode: raw
                help_text: "En overordnet beskrivelse av behandlingsaktiviteten."
          - key: organization_context
            label: "Organisasjonsforankring"
            fields:
              - key: controller
                label: "Artikkel 30 nr. 1 bokstav a - Behandlingsansvarlig"
                type: reference
                required: true
                control: input_text_disabled
                option_source: organization_role.controller
                help_text_mode: normalized_transcription
                help_text: |-
                  Behandlingsansvarlig er overordnet ansvarlig for å overholde personvernsprinsippene og regelverket for behandlingen av persondata.

                  Kan kun endres av organisasjonsadministrator og blir satt under "Min organisasjon".
              - key: data_protection_officer
                label: "Artikkel 30 nr. 1 bokstav a - Personvernombud"
                type: reference
                required: true
                control: input_text_disabled
                option_source: organization_role.data_protection_officer
                help_text_mode: normalized_transcription
                help_text: |-
                  Personvernombudets rolle er å gi råd til virksomheten om hvordan personverninteressene kan best mulig ivaretas, men også å kontrollere etterlevelsen av regelverket.

                  Kan kun endres av organisasjonsadministrator og blir satt under "Min organisasjon".
              - key: joint_controllers
                label: "Artikkel 30 nr. 1 bokstav a - Felles behandlingsansvarlige"
                type: collection_reference
                required: false
                control: search_select_repeating
                option_source: organization_role.joint_controller
                placeholder: "Velg fra listen"
                help_text_mode: raw
                help_text: "Velg andre behandlingsansvarlige som sammen med kommunen fastsetter formålene med og midlene for behandlingen."
          - key: purpose_and_categories
            label: "Formål og kategorier"
            fields:
              - key: purposes
                label: "Artikkel 30 nr. 1 bokstav b - Formålet med behandlingen"
                type: collection_enum_or_text
                required: true
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Angi ett eller flere konkrete formål med behandlingen. Formålet bør beskrive hvorfor personopplysningene behandles."
                observed_values:
                  - "Avregning for barnehageplass"
                  - "Avregning for pleiehjemsplass"
                  - "Avregning for SFO"
                  - "Beregning av lønn og annen kompensasjon til ansatte"
                  - "Forskningsformål"
                  - "Kontaktregister; oversikt over foresatte"
                  - "Oversikt over FAU - medlemmer"
                  - "Oversikt over frivillige"
                  - "Statistikkformål"
                  - "Tildele barnehageplass"
              - key: data_subject_categories
                label: "Artikkel 30 nr. 1 bokstav c - Kategoriene av registrerte"
                type: collection_enum_or_text
                required: true
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Velg hvilke grupper registrerte behandlingen gjelder, for eksempel ansatte, innbyggere, elever eller foresatte."
                observed_values:
                  - "Ansatt"
                  - "Barn"
                  - "Barneskoleelev"
                  - "Fagforeningsmedlem"
                  - "Foresatte"
                  - "Hjelpepleier"
                  - "Hjemmehjelp"
                  - "Klient - kriminalforsorg"
                  - "Lege"
                  - "Legesekretær"
                  - "Låntaker - sosiallån"
                  - "Låntaker - startlån"
                  - "Pasient"
                  - "Sykepleier"
                  - "Ungdomsskoleelev"
                  - "Verge"
              - key: personal_data_categories
                label: "Artikkel 30 nr. 1 bokstav c - Kategorier av personopplysninger"
                type: collection_enum_or_text
                required: true
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Angi hvilke typer personopplysninger som behandles, inkludert særlige kategorier eller opplysninger om straffbare forhold der det er relevant."
                observed_values:
                  - "Bilde av person"
                  - "Etnisk opprinnelse"
                  - "Fagforeningsmedlemskap"
                  - "Fingeravtrykk"
                  - "Hodeform"
                  - "IMEI-nummer"
                  - "IP-adresse"
                  - "Irismønster"
                  - "Kjøretøy-registreringsnummer"
                  - "Kontaktopplysninger"
                  - "Lydopptak"
                  - "MAC-adresse"
                  - "Navn"
                  - "Straffbare forhold (artikkel 10)"
                  - "Videoopptak av person"
              - key: recipient_categories
                label: "Artikkel 30 nr. 1 bokstav d - Kategorier av mottakere"
                type: collection_enum_or_text
                required: true
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Angi hvilke kategorier mottakere som kan få tilgang til eller motta personopplysningene som del av behandlingen."
                observed_values:
                  - "Advokat"
                  - "FAU-medlemmer"
                  - "Foresatte"
                  - "Kontaktlærer"
                  - "Lege"
                  - "Logoped"
                  - "Pårørende"
                  - "Regnskapsavdeling"
                  - "Revisor"
                  - "Saksbehandler - Låneadministrasjon"
                  - "Saksbehandler - NAV"
                  - "Saksbehandler - PPT"
                  - "Saksbehandler - Utdanning"
                  - "Sekretariat"
                  - "Skolehelsetjeneste"
                  - "Spesialisthelsetjeneste - Ergoterapi"
                  - "Spesialisthelsetjeneste - Fysioterapi"
                  - "Verge"
          - key: transfer_and_guarantees
            label: "Overføring og garantier"
            fields:
              - key: third_country_or_international_organization
                label: "Artikkel 30 nr. 1 bokstav e - Identifikasjon av tredjestat eller internasjonal organisasjon"
                type: text
                required: true
                control: input_text
                placeholder: "Ny tekst"
                help_text_mode: raw
                help_text: "Land og/eller internasjonal organisasjon som behandler opplysningene (dersom relevant)."
              - key: guarantees_or_agreement
                label: "Artikkel 30 nr. 1 bokstav e - Dokumentasjon på nødvendige garantier eller virksomhetsavtale"
                type: collection_text_or_search
                required: true
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Dokumenter hvilke garantier, avtaler eller mekanismer som benyttes dersom opplysninger overføres til tredjestat eller internasjonal organisasjon."
          - key: retention_and_security
            label: "Oppbevaring og sikkerhet"
            fields:
              - key: deletion_of_personal_data
                label: "Artikkel 30 nr. 1 bokstav f - Sletting av personopplysninger"
                type: text
                required: true
                control: input_text
                placeholder: "Ny tekst"
                help_text_mode: normalized_transcription
                help_text: |-
                  For hver behandling skal det angis når opplysningene slettes.

                  Dette punktet er knyttet til prinsippet om dataminimering og den registrertes rett til sletting, "rett til å bli glemt". Dersom data ikke kan slettes fysisk, kan tiltak som dataminimering og endret tilgang gjennom livsløpet være aktuelt.
              - key: security_measures
                label: "Artikkel 30 nr. 1 bokstav g - Generell beskrivelse av tekniske og organisatoriske sikkerhetstiltak"
                type: textarea
                required: true
                control: textarea
                placeholder: "Ny tekst"
                help_text_mode: normalized_transcription
                help_text: |-
                  For hver behandling bør det dokumenteres hvordan opplysningene beskyttes mot uberettiget innsyn eller endring/sletting, for eksempel tilgangskontroll og kryptering.

                  Det bør også dokumenteres hvordan nødvendig tilgjengelighet sikres, for eksempel backup, logging, driftsstabilitet og rutiner for driftskontinuitet, samt prosedyre for regelmessig evaluering av sikkerhetstiltakenes tilstrekkelighet.
          - key: legal_basis
            label: "Behandlingsgrunnlag"
            fields:
              - key: article_6_legal_basis
                label: "Artikkel 6 - Behandlingsgrunnlag"
                type: collection_enum
                required: true
                control: search_select_repeating
                placeholder: "Velg fra listen"
                help_text_mode: raw
                help_text: "Velg ett eller flere behandlingsgrunnlag etter artikkel 6 som hjemler behandlingen."
                observed_values:
                  - "6.1.a Samtykke"
                  - "6.1.b Nødvendig for å oppfylle en avtale"
                  - "6.1.c Nødvendig for å oppfylle en rettslig plikt"
                  - "6.1.d Nødvendig for å beskytte vitale interesser"
                  - "6.1.e Nødvendig for å utføre en oppgave i offentlig interesse eller utøve offentlig myndighet"
                  - "6.1.f Nødvendig for å ivareta legitime interesser - interesseavveiing"
              - key: article_6_reason
                label: "Begrunnelse artikkel 6"
                type: textarea
                required: false
                control: textarea
                placeholder: "Ny tekst"
                help_text_mode: raw
                help_text: "Et valgfritt felt for utdyping, avveining eller begrunnelse for behandlingsgrunnlag artikkel 6."
              - key: article_9_10_legal_basis
                label: "Artikkel 9 / 10 - Behandlingsgrunnlag av særlige kategorier av personopplysninger"
                type: collection_enum
                required: true
                control: search_select_repeating
                placeholder: "Velg fra listen"
                help_text_mode: raw
                help_text: "Velg grunnlag etter artikkel 9 eller 10 dersom behandlingen omfatter særlige kategorier av personopplysninger eller opplysninger om straffedommer og lovovertredelser."
                observed_values:
                  - "Ikke relevant"
                  - "9.2.a Samtykke"
                  - "9.2.b Tillatt etter lov eller tariffavtale"
                  - "9.2.c Verne rettigheter når den registrerte ikke kan samtykke"
                  - "9.2.d Medlemsregister, samtykket bruk"
                  - "9.2.e Opplysninger den registrerte har offenliggjort"
                  - "9.2.f Rettskrav eller innenfor domstols myndighet"
                  - "9.2.g Har hjemmel i lov og hensyn til viktig allmenn interesse"
                  - "9.2.h Medisinske hensyn"
                  - "9.2.i Allmenne folkehelsehensyn"
                  - "9.2.j Arkivformål i allmenn interesse"
                  - "pol § 11: Straffedom og lovovertredelse under off.myndighetskontroll"
                  - "pol § 6: arb.rettslige plikter og rettigheter (arb.forhold)"
                  - "pol § 7: Eksplisitt tillatt av Datatilsynet"
                  - "pol § 9: Uten samtykke; arkiv -, vitenskapelig / historisk eller statistisk formål"
              - key: article_9_10_reason
                label: "Begrunnelse artikkel 9 / 10"
                type: textarea
                required: false
                control: textarea
                placeholder: "Ny tekst"
                help_text_mode: raw
                help_text: "Et valgfritt felt for utdyping, avveining eller begrunnelse for behandlingsgrunnlag artikkel 9 / 10."
              - key: legal_obligation
                label: "Rettslig forpliktelse"
                type: text
                required: false
                control: input_text
                placeholder: "Ny tekst"
                help_text_mode: raw
                help_text: "Oppgi lov, forskrift eller annet rettslig grunnlag dersom behandlingen bygger på en rettslig forpliktelse."
          - key: risk_sources_processors
            label: "Risiko, kilde og databehandlere"
            fields:
              - key: high_privacy_risk
                label: "Kan behandlingen innebære høy personvernrisiko"
                type: boolean
                required: false
                control: radio
                options:
                  - value: true
                    label: "Ja"
                  - value: false
                    label: "Nei"
                help_text_mode: raw
                help_text: "For hver behandling bør det vurderes hvilken risiko det utgjør for den registrerte om data kommer på avveie."
              - key: personal_data_source
                label: "Kilde til personopplysninger"
                type: collection_enum_or_text
                required: false
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
                help_text: "Angi hvor personopplysningene hentes fra, for eksempel fra den registrerte selv, foresatte, arbeidsgiver eller offentlige registre."
                observed_values:
                  - "Annen 3. part"
                  - "Arbeidsgiver"
                  - "Den registrerte"
                  - "Foresatte"
                  - "Offentlig dataregister"
                  - "Pårørende"
              - key: data_processors
                label: "Databehandlere"
                type: collection_text_or_search
                required: false
                control: search_select_repeating
                placeholder: "Skriv ny eller velg fra listen"
                help_text_mode: raw
